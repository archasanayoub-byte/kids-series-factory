name: Publish videos to YouTube

on:
  # FORMAT CHANGE (17 July 2026): moved from twice-weekly (Mon/Thu) to DAILY.
  # Generation still happens only Sun & Wed 21:00 Israel time (bobo-festuk-episode-generator
  # scheduled task), but each generation run now queues a 3-part STORY (Part 1/2/3) instead of
  # a single episode. Running this publish job daily drains one part per day, spreading the
  # 3 parts across separate days -- matching the competitor's near-daily release cadence and
  # letting the Part 1/Part 2 cliffhangers actually land before the payoff airs in Part 3.
  #   14:00 UTC = 17:00 Israel time (summer/DST)
  # NOTE: Israel exits DST in late October; shift this by -1 hour in winter
  # if you want the same local release time (13:00 UTC).
  schedule:
    - cron: "0 14 * * *"
  # Allows a manual "Run workflow" button in the Actions tab (does NOT wait
  # for the schedule -- useful for testing or an extra manual release)
  workflow_dispatch: {}

# Needed so the job can commit the manifest/cleanup changes back to the repo
permissions:
  contents: write

concurrency:
  group: youtube-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Upload pending videos to YouTube
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBETOKENJSON }}
        run: python scripts/publish_all.py

      - name: Commit manifest and cleanup
        run: |
          git config user.name "youtube-publish-bot"
          git config user.email "actions@users.noreply.github.com"
          git add uploaded_manifest.json videos/uploaded videos/to_upload
          if ! git diff --cached --quiet; then
            git commit -m "chore: publish videos to YouTube [skip ci]"
            git push
          else
            echo "Nothing to commit."
          fi
